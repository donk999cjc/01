<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 跨课程智能教学平台</title>

    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/login.css">

    <!-- 在这里加小眼睛样式，不影响你原有格式 -->
    <style>
        .password-wrapper {
            position: relative;
            width: 100%;
        }
        .password-wrapper .form-input {
            padding-right: 40px;
            box-sizing: border-box;
        }
        .eye-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #999;
            user-select: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">
        <h1>跨课程智能教学平台</h1>
        <p id="subtitle">请输入账号密码登录系统</p>
    </div>

    <!-- 登录/注册切换标签 -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab('login', this)" id="loginTab">登录</div>
        <div class="tab" onclick="switchTab('register', this)" id="registerTab">注册</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <!-- 登录表单 -->
    <div id="loginForm">
        <div class="form-group">
            <label> 学号 / 工号</label>
            <input type="text" class="form-input" id="username" placeholder="请输入用户名" autocomplete="username" autofocus>
        </div>

        <div class="form-group">
            <label>密码</label>
            <div class="password-wrapper">
                <input type="password" class="form-input" id="password" placeholder="请输入密码" autocomplete="current-password">
                <span class="eye-icon" onclick="togglePassword()">👁️</span>
            </div>
        </div>

        <!-- 验证码 -->
        <div style="display: flex; gap: 10px; margin: 15px 0;">
            <input type="text" placeholder="请输入验证码" id="captcha" style="flex: 1; height: 40px; padding: 0 10px;">
            <img id="captchaImg" src="/captcha" onclick="this.src='/captcha?t='+new Date().getTime()"
                 style="height: 40px; cursor: pointer;">
        </div>

        <button class="btn-primary" onclick="doLogin()" id="loginBtn">登 录</button>
    </div>

    <!-- 注册表单 -->
    <div id="registerForm" style="display:none;">
        <div class="role-select" id="roleSelect">
            <div class="role-option selected" onclick="selectRole('STUDENT', this)" data-role="STUDENT">
                <div class="role-icon">👨‍🎓</div>
                <div class="role-text">学生账号</div>
            </div>
            <div class="role-option" onclick="selectRole('TEACHER', this)" data-role="TEACHER">
                <div class="role-icon">👨‍🏫</div>
                <div class="role-text">教师账号</div>
            </div>
        </div>

        <div class="form-group">
            <label id="idLabel">学号</label>
            <input type="text" class="form-input" id="regId" placeholder="请输入学号或工号">
        </div>

        <div class="form-group">
            <label>姓名</label>
            <input type="text" class="form-input" id="regName" placeholder="请输入真实姓名">
        </div>

        <div class="form-group">
            <label>用户名</label>
            <input type="text" class="form-input" id="regUsername" placeholder="用于登录的用户名">
        </div>

        <div class="form-group">
            <label>密码</label>
            <input type="password" class="form-input" id="regPassword" placeholder="请设置密码（至少6位）">
        </div>

        <button class="btn-primary" onclick="doRegister()" id="regBtn">注 册</button>
    </div>

    <div class="footer">智能批改 · 数据分析 · 高效教学</div>
</div>

<!-- 密码显示/隐藏 功能 -->
<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.querySelector('.eye-icon');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.textContent = '🙈';
        } else {
            passwordInput.type = 'password';
            eyeIcon.textContent = '👁️';
        }
    }
</script>

<!-- 业务逻辑 -->
<script src="js/login.js"></script>
</body>
</html>
