<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 跨课程智能教学平台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center
        }

        .login-container{
            background:#fff;
            border-radius:12px;
            padding:40px 45px;
            width:420px;
            box-shadow:0 20px 60px rgba(0,0,0,0.2)
        }

        .logo{
            text-align:center;
            margin-bottom:28px
        }
        .logo h1{
            font-size:24px;
            color:#1a1a1a;
            margin-bottom:8px;
            font-weight:600
        }
        .logo p{
            font-size:14px;
            color:#666
        }

        .tabs{
            display:flex;
            margin-bottom:20px;
            border-bottom:2px solid #eee
        }
        .tab{
            flex:1;
            padding:10px;
            text-align:center;
            cursor:pointer;
            font-size:15px;
            font-weight:500;
            color:#666;
            transition:all 0.3s
        }
        .tab.active{
            color:#667eea;
            border-bottom:2px solid #667eea;
            margin-bottom:-2px
        }
        .tab:hover{
            color:#667eea
        }

        .form-group{
            margin-bottom:18px
        }
        .form-group label{
            display:block;
            font-size:14px;
            font-weight:500;
            color:#333;
            margin-bottom:8px
        }
        .form-input{
            width:100%;
            padding:12px 14px;
            border:1px solid #ddd;
            border-radius:6px;
            font-size:15px;
            transition:border-color 0.3s;
            outline:none
        }
        .form-input:focus{
            border-color:#667eea;
            box-shadow:0 0 0 3px rgba(102,126,234,0.1)
        }

        .role-select{
            display:flex;
            gap:12px;
            margin-bottom:18px
        }
        .role-option{
            flex:1;
            padding:12px;
            border:2px solid #ddd;
            border-radius:8px;
            text-align:center;
            cursor:pointer;
            transition:all 0.3s
        }
        .role-option.selected{
            border-color:#667eea;
            background:#f5f7ff
        }
        .role-option:hover{
            border-color:#667eea
        }
        .role-icon{
            font-size:28px;
            margin-bottom:6px
        }
        .role-text{
            font-size:13px;
            font-weight:500;
            color:#333
        }

        .btn-primary{
            width:100%;
            padding:13px;
            background:#667eea;
            color:#fff;
            border:none;
            border-radius:6px;
            font-size:16px;
            font-weight:500;
            cursor:pointer;
            transition:all 0.3s;
            margin-top:4px
        }
        .btn-primary:hover{
            background:#5a6fd6
        }
        .btn-primary:disabled{
            background:#ccc;
            cursor:not-allowed
        }

        .error-msg{
            background:#fef0f0;
            color:#f56c6c;
            padding:10px 14px;
            border-radius:6px;
            font-size:13px;
            margin-bottom:16px;
            display:none
        }
        .error-msg.show{
            display:block
        }

        .success-msg{
            background:#f0f9eb;
            color:#67c23a;
            padding:10px 14px;
            border-radius:6px;
            font-size:13px;
            margin-bottom:16px;
            display:none
        }
        .success-msg.show{
            display:block
        }

        .footer{
            text-align:center;
            margin-top:20px;
            font-size:12px;
            color:#aaa
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">
        <h1>跨课程智能教学平台</h1>
        <p id="subtitle">请输入账号密码登录系统</p>
    </div>

    <!-- 登录/注册切换标签 -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab('login', this)" id="loginTab">登录</div>
        <div class="tab" onclick="switchTab('register', this)" id="registerTab">注册</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <!-- 登录表单 -->
    <div id="loginForm">
        <div class="form-group">
            <label>用户名 / 学号 / 工号</label>
            <input type="text" class="form-input" id="username" placeholder="请输入用户名" autocomplete="username" autofocus>
        </div>

        <div class="form-group">
            <label>密码</label>
            <input type="password" class="form-input" id="password" placeholder="请输入密码" autocomplete="current-password">
        </div>

        <button class="btn-primary" onclick="doLogin()" id="loginBtn">登 录</button>
    </div>

    <!-- 注册表单 -->
    <div id="registerForm" style="display:none;">
        <div class="role-select" id="roleSelect">
            <div class="role-option selected" onclick="selectRole('STUDENT', this)" data-role="STUDENT">
                <div class="role-icon">👨‍🎓</div>
                <div class="role-text">学生账号</div>
            </div>
            <div class="role-option" onclick="selectRole('TEACHER', this)" data-role="TEACHER">
                <div class="role-icon">👨‍🏫</div>
                <div class="role-text">教师账号</div>
            </div>
        </div>

        <div class="form-group">
            <label id="idLabel">学号</label>
            <input type="text" class="form-input" id="regId" placeholder="请输入学号或工号">
        </div>

        <div class="form-group">
            <label>姓名</label>
            <input type="text" class="form-input" id="regName" placeholder="请输入真实姓名">
        </div>

        <div class="form-group">
            <label>用户名</label>
            <input type="text" class="form-input" id="regUsername" placeholder="用于登录的用户名">
        </div>

        <div class="form-group">
            <label>密码</label>
            <input type="password" class="form-input" id="regPassword" placeholder="请设置密码（至少6位）">
        </div>

        <button class="btn-primary" onclick="doRegister()" id="regBtn">注 册</button>
    </div>

    <div class="footer">智能批改 · 数据分析 · 高效教学</div>
</div>

<script>
let currentRole = 'STUDENT'

function switchTab(tab, element) {
    // 切换标签样式
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
    element.classList.add('active')
    
    // 显示/隐藏表单
    if (tab === 'login') {
        document.getElementById('loginForm').style.display = 'block'
        document.getElementById('registerForm').style.display = 'none'
        document.getElementById('subtitle').textContent = '请输入账号密码登录系统'
    } else {
        document.getElementById('loginForm').style.display = 'none'
        document.getElementById('registerForm').style.display = 'block'
        document.getElementById('subtitle').textContent = '创建新账号，开始使用平台'
    }
    
    hideMessages()
}

function selectRole(role, element) {
    currentRole = role
    
    // 更新选中状态
    document.querySelectorAll('.role-option').forEach(opt => opt.classList.remove('selected'))
    element.classList.add('selected')
    
    // 更新标签文字
    const label = document.getElementById('idLabel')
    const idInput = document.getElementById('regId')
    if (role === 'STUDENT') {
        label.textContent = '学号'
        idInput.placeholder = '请输入学号，如：S001'
    } else {
        label.textContent = '工号'
        idInput.placeholder = '请输入工号，如：T001'
    }
}

async function doLogin(){
    const username=document.getElementById('username').value.trim();
    const password=document.getElementById('password').value.trim();

    if(!username||!password){
        showError('请输入用户名和密码');
        return;
    }

    const btn=document.getElementById('loginBtn');
    btn.disabled=true;
    btn.textContent='登录中...';
    hideMessages();

    try{
        const res=await fetch('/api/auth/login',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({username,password})
        });

        const data=await res.json();

        if(data.success&&data.user){
            localStorage.setItem('token',data.token||'logged-in');
            localStorage.setItem('user',JSON.stringify({
                username:data.user.username||username,
                realName:data.user.realName||username,
                role:data.user.role,
                studentId:data.user.studentId,
                teacherId:data.user.teacherId,
                userId:data.user.id
            }));

            const role=data.user.role;
            if(role==='TEACHER'){
                window.location.href='/teacher.html';
            }else if(role==='STUDENT'){
                window.location.href='/student.html';
            }else{
                showError('未知角色类型');
                resetButton();
            }
        }else{
            showError(data.message||'用户名或密码错误');
            resetButton();
        }
    }catch(e){
        console.error('登录错误:',e);
        showError('网络错误，请检查服务器是否启动');
        resetButton();
    }
}

async function doRegister() {
    const id = document.getElementById('regId').value.trim()
    const name = document.getElementById('regName').value.trim()
    const username = document.getElementById('regUsername').value.trim()
    const password = document.getElementById('regPassword').value.trim()

    // 验证
    if (!id || !name || !username || !password) {
        showError('请填写所有必填项')
        return
    }

    if (password.length < 6) {
        showError('密码长度不能少于6位')
        return
    }

    const btn = document.getElementById('regBtn')
    btn.disabled = true
    btn.textContent = '注册中...'
    hideMessages()

    try {
        const userData = {
            username: username,
            password: password,
            realName: name,
            role: currentRole
        }

        if (currentRole === 'STUDENT') {
            userData.studentId = id
        } else {
            userData.teacherId = id
        }

        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        })

        const data = await res.json()

        if (data.success) {
            showSuccess('注册成功！正在跳转到登录...')
            setTimeout(() => {
                switchTab('login', document.getElementById('loginTab'))
                document.getElementById('username').value = username
                document.getElementById('password').value = ''
            }, 1500)
        } else {
            showError(data.message || '注册失败')
            resetRegButton()
        }
    } catch (e) {
        console.error('注册错误:', e)
        showError('网络错误，请检查服务器是否启动')
        resetRegButton()
    }
}

function showError(msg){
    const el=document.getElementById('errorMsg');
    el.textContent=msg;
    el.classList.add('show');
    document.getElementById('successMsg').classList.remove('show');
    resetButton();
    resetRegButton();
}

function showSuccess(msg){
    const el=document.getElementById('successMsg');
    el.textContent=msg;
    el.classList.add('show');
    document.getElementById('errorMsg').classList.remove('show');
}

function hideMessages() {
    document.getElementById('errorMsg').classList.remove('show')
    document.getElementById('successMsg').classList.remove('show')
}

function resetButton(){
    const btn=document.getElementById('loginBtn');
    btn.disabled=false;
    btn.textContent='登 录';
}

function resetRegButton(){
    const btn=document.getElementById('regBtn');
    btn.disabled=false;
    btn.textContent='注 册';
}

document.addEventListener('DOMContentLoaded',()=>{
    document.getElementById('password').addEventListener('keydown',e=>{
        if(e.key==='Enter')doLogin();
    });
    document.getElementById('regPassword').addEventListener('keydown',e=>{
        if(e.key==='Enter')doRegister();
    });
});
</script>
</body>
</html>
