server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/agent_framework?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.agentframework.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

logging.level.org.springframework=info
logging.level.com.example=debug

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.mvc.encoding.charset=UTF-8
spring.mvc.encoding.force=true
spring.mvc.encoding.force-request=true
spring.mvc.encoding.force-response=true

# ==========================================
# AI
ai.api.enabled=true
ai.api.key=8cf1f8e6a4124171b4ec6f8b8ae1db15.CcavytqNr9azWmAL
ai.api.model=glm-4V

# ==========================================
# Milvus Vector Database
milvus.host=localhost
milvus.port=19530
milvus.collection.name=knowledge_vectors
milvus.dimension=1024
milvus.index.type=IVF_FLAT
milvus.metric.type=COSINE
milvus.nlist=1024
milvus.nprobe=16
milvus.topk=5

# ==========================================
# Embedding API (ZhipuAI embedding-3)
embedding.api.url=https://open.bigmodel.cn/api/paas/v4/embeddings
embedding.api.model=embedding-3

# ==========================================
# Redis
spring.redis.enabled=false
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=2
spring.redis.timeout=5000ms

# ==========================================
# RAG
rag.chunk.size=500
rag.chunk.overlap=100
rag.max.context.length=3000
rag.relevance.threshold=0.6

# ==========================================
# BKT Model Defaults
bkt.pl0=0.3
bkt.pt=0.1
bkt.pg=0.2
bkt.ps=0.1

# ==========================================
# Agent Workflow
workflow.max.steps=20
workflow.timeout.seconds=300
